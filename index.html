<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pug's Big Adventure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a00; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; }
canvas { display: block; border: 3px solid #5c3d1e; }
#controls { color: #aa8855; margin-top: 6px; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game" width="800" height="450"></canvas>
<div id="controls">Arrow Keys / WASD: Move &amp; Jump &nbsp;|&nbsp; Z or X: Claw Attack</div>
<div id="name-entry" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;z-index:10;">
  <div style="background:#1a0a00;border:3px solid #c8a050;padding:24px 32px;text-align:center;font-family:'Courier New',monospace;color:#fff8e7;">
    <div id="name-entry-title" style="font-size:22px;font-weight:bold;color:#ff4444;margin-bottom:4px;">WOOF!</div>
    <div id="name-entry-subtitle" style="font-size:13px;color:#aaa;margin-bottom:14px;">Enter your initials</div>
    <input id="initials-input" maxlength="20" autocomplete="off"
      style="font-family:'Courier New',monospace;font-size:20px;width:220px;text-align:center;
             background:#2a1400;color:#ffcc00;border:2px solid #c8a050;
             outline:none;padding:4px 8px;">
    <br><br>
    <button id="initials-ok"
      style="font-family:'Courier New',monospace;font-size:14px;background:#5c3d1e;
             color:#fff8e7;border:2px solid #c8a050;padding:8px 22px;cursor:pointer;">OK</button>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
